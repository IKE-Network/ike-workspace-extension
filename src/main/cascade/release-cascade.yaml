# release-cascade.yaml — ike-workspace-extension's edges in the IKE
# release cascade (IKE-Network/ike-issues#420, #460).
#
# The cascade is a loosely-coupled distributed system: every
# foundation repo version-controls this file in its own git tree and
# declares ONLY its own edges. No project authors the global ordering
# — the full graph is assembled by traversing these per-project
# files.
#
#   upstream   — projects this repo consumes. The canonical ${G·A}
#                version pin (U+00B7) that the cascade aligns is
#                derived mechanically from each upstream's coordinates
#                (IKE-Network/ike-issues#496).
#                ike-workspace-extension has no cascade-tracked upstream —
#                it inherits ike-base-parent (Tier 0) but parent-inheritance
#                bumps are not yet cascade-tracked
#                (IKE-Network/ike-issues#462).
#   downstream — foundation projects that consume this repo; the
#                cascade executor walks forward to each after a
#                release here.

schema: 1
# No cascade-tracked upstream: the only upstream is ike-base-parent,
# inherited via <parent>, and parent-inheritance is not cascade-
# tracked yet (IKE-Network/ike-issues#462). Asserting head positively
# so a forgotten upstream edge is a manifest error, not a silent
# omission — per the cascade schema convention.
head: true

downstream:
  - groupId: network.ike.platform
    artifactId: ike-platform
    url: https://github.com/IKE-Network/ike-platform.git
